[pytest]
# pytest 配置文件
testpaths = UI_Automation/Tests API_Automation/cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    smoke: 冒烟测试 (P0)
    regression: 回归测试 (P1)
    api: 接口测试
    ui: UI测试
    slow: 耗时较长的测试

# 日志
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%s

# Allure
allure_severities = blocker critical normal minor trivial
allure_epics = 用户模块 商品模块 购物车模块 订单模块
allure_features = 登录 注册 首页 分类 详情 购物车 下单 支付

# 重试
addopts = -v --tb=short --strict-markers --reruns 2 --reruns-delay 1

# 超时（需要 pip install pytest-timeout）
timeout = 300
timeout_method = thread
