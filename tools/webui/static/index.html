<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS-Automation-Framework</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.35/dist/codicon.css">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1629;
  --bg3: #151d35;
  --bg4: #1a2340;
  --border: #1e2d4a;
  --border2: #243354;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Header */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo .icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.header-logo h1 { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
.header-badges { display: flex; gap: 6px; margin-left: 8px; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid; }
.badge.green { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.3); color: var(--green); }
.badge.red { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--red); }
.badge.gray { background: rgba(100,116,139,.1); border-color: rgba(100,116,139,.3); color: var(--text2); }
.badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* Layout */
.layout { display: grid; grid-template-columns: 240px 1fr 340px; flex: 1; overflow: hidden; }

/* Sidebar - File Tree */
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 12px 14px 8px; display: flex; align-items: center; justify-content: space-between; }
.sidebar-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); }
.sidebar-search { margin: 0 10px 8px; position: relative; }
.sidebar-search input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px 6px 28px; font-size: 12px; color: var(--text); outline: none; }
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; }
.file-tree { flex: 1; overflow-y: auto; padding: 4px 6px 12px; }
.file-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all .15s; white-space: nowrap; overflow: hidden; }
.file-item:hover { background: var(--bg3); color: var(--text); }
.file-item.active { background: rgba(59,130,246,.15); color: var(--accent2); border-left: 2px solid var(--accent); padding-left: 6px; }
.file-item .file-icon { font-size: 12px; flex-shrink: 0; }
.file-item .file-name { overflow: hidden; text-overflow: ellipsis; }
.file-item .file-dir { font-size: 10px; color: var(--text3); margin-left: auto; flex-shrink: 0; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }

/* Center panel */
.center { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.tab-bar { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 4px; flex-shrink: 0; }
.tab { padding: 12px 16px; font-size: 13px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .tab-icon { font-size: 13px; }

/* Code view */
.code-view { flex: 1; overflow: auto; padding: 20px 24px; }
.code-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); }
.code-empty .empty-icon { font-size: 48px; opacity: .3; }
.code-empty p { font-size: 13px; }
.code-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 8px 12px; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); }
.code-header .path { font-size: 12px; color: var(--text2); font-family: 'Courier New', monospace; }
.code-header .copy-btn { margin-left: auto; padding: 3px 8px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; font-size: 11px; color: var(--text2); cursor: pointer; }
.code-header .copy-btn:hover { color: var(--text); }
pre { font-family: 'Courier New', 'Fira Code', monospace; font-size: 12px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-all; }

/* Chat */
.chat-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.chat-welcome { text-align: center; padding: 32px 16px; color: var(--text3); }
.chat-welcome .welcome-icon { font-size: 36px; margin-bottom: 12px; }
.chat-welcome h3 { font-size: 14px; color: var(--text2); margin-bottom: 6px; }
.chat-welcome p { font-size: 12px; line-height: 1.6; }
.chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; }
.suggestion { padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; font-size: 11px; color: var(--text2); cursor: pointer; transition: all .15s; }
.suggestion:hover { border-color: var(--accent); color: var(--accent2); }
.msg-row { display: flex; gap: 10px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.msg-avatar.user { background: linear-gradient(135deg, var(--accent), var(--purple)); }
.msg-avatar.assistant { background: linear-gradient(135deg, var(--cyan), var(--green)); }
.msg-bubble { max-width: 85%; }
.msg-content { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
.msg-row.user .msg-content { background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(168,85,247,.2)); border: 1px solid rgba(59,130,246,.3); border-radius: 12px 2px 12px 12px; }
.msg-row.assistant .msg-content { background: var(--bg3); border: 1px solid var(--border2); border-radius: 2px 12px 12px 12px; }
.msg-refs { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.msg-ref { padding: 2px 8px; background: rgba(6,182,212,.1); border: 1px solid rgba(6,182,212,.2); border-radius: 4px; font-size: 10px; color: var(--cyan); font-family: monospace; cursor: pointer; }
.msg-ref:hover { background: rgba(6,182,212,.2); }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; padding: 0 4px; }
.msg-row.user .msg-time { text-align: right; }
.typing { display: flex; gap: 4px; padding: 12px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 2px 12px 12px 12px; width: fit-content; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: typing 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.chat-input-wrap { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg2); }
.chat-input-box { display: flex; gap: 8px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 12px; transition: border-color .15s; }
.chat-input-box:focus-within { border-color: var(--accent); }
.chat-input-box input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; color: var(--text); }
.chat-input-box input::placeholder { color: var(--text3); }
.send-btn { width: 30px; height: 30px; border-radius: 6px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.send-btn:hover:not(:disabled) { background: var(--accent2); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Right panel */
.right { background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

/* Env cards */
.env-section { padding: 14px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.env-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.env-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; }
.env-card .env-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.env-card .env-val { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.env-card .env-val.ok { color: var(--green); }
.env-card .env-val.err { color: var(--red); }
.env-card .env-val.warn { color: var(--orange); }

/* Module list */
.modules-section { padding: 14px; border-bottom: 1px solid var(--border); }
.module-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; transition: border-color .15s; }
.module-card:hover:not(.disabled) { border-color: var(--border2); }
.module-card.disabled { opacity: .5; }
.module-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.module-icon.api { background: rgba(59,130,246,.15); }
.module-icon.ui { background: rgba(168,85,247,.15); }
.module-info { flex: 1; min-width: 0; }
.module-name { font-size: 13px; font-weight: 500; }
.module-hint { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.run-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all .15s; flex-shrink: 0; }
.run-btn.api { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.4); color: var(--accent2); }
.run-btn.api:hover:not(:disabled) { background: rgba(59,130,246,.25); }
.run-btn.ui { background: rgba(168,85,247,.15); border-color: rgba(168,85,247,.4); color: #c084fc; }
.run-btn.ui:hover:not(:disabled) { background: rgba(168,85,247,.25); }
.run-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Log panel */
.log-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.log-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.log-area { flex: 1; overflow-y: auto; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.6; background: var(--bg); }
.log-line { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
.log-line.pass { color: var(--green); }
.log-line.fail { color: var(--red); }
.log-line.warn { color: var(--orange); }
.log-line.info { color: var(--text2); }
.log-line.dim { color: var(--text3); }
.log-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 8px; font-size: 12px; }

/* Status bar */
.status-bar { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--bg2); flex-shrink: 0; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.idle { background: var(--text3); }
.status-dot.queued { background: var(--orange); }
.status-dot.running { background: var(--accent); animation: pulse 1s infinite; }
.status-dot.succeeded { background: var(--green); }
.status-dot.failed { background: var(--red); }
.status-dot.cancelled { background: var(--text3); }
.status-dot.timeout { background: var(--orange); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
.status-text { font-size: 12px; color: var(--text2); }
.status-time { font-size: 11px; color: var(--text3); }
.report-link { margin-left: auto; font-size: 11px; color: var(--accent2); text-decoration: none; display: flex; align-items: center; gap: 4px; padding: 3px 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); border-radius: 4px; }
.report-link:hover { background: rgba(59,130,246,.2); }
.cancel-btn { margin-left: auto; padding: 3px 10px; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 4px; font-size: 11px; color: var(--red); cursor: pointer; }
.cancel-btn:hover { background: rgba(239,68,68,.2); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); transition: all .15s; }
.btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg4); }
</style>
</head>
<body x-data="app()" x-init="init()">

<!-- Header -->
<div class="header">
  <div class="header-logo">
    <div class="icon">🧪</div>
    <h1>iOS-Automation-Framework</h1>
  </div>
  <div class="header-badges">
    <span class="badge" :class="env.api_runnable ? 'green' : 'red'">
      <span class="dot"></span>
      <span x-text="env.api_runnable ? 'API Ready' : 'API N/A'"></span>
    </span>
    <span class="badge" :class="env.ios_ui_runnable ? 'green' : 'red'">
      <span class="dot"></span>
      <span x-text="env.ios_ui_runnable ? 'iOS UI Ready' : 'iOS UI N/A'"></span>
    </span>
    <span class="badge gray" x-text="env.platform || 'Loading...'"></span>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">文件浏览</span>
      <span style="font-size:11px;color:var(--text3)" x-text="files.length + ' 个文件'"></span>
    </div>
    <div class="sidebar-search">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="搜索文件..." x-model="fileSearch">
    </div>
    <div class="file-tree">
      <template x-for="f in filteredFiles" :key="f.path">
        <div class="file-item" :class="{active: activeFile === f.path}" @click="loadFile(f.path)">
          <span class="file-icon" x-text="fileIcon(f.path)"></span>
          <span class="file-name" x-text="fileName(f.path)"></span>
          <span class="file-dir" x-text="fileDir(f.path)"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="tab-bar">
      <div class="tab" :class="{active: tab==='code'}" @click="tab='code'">
        <span class="tab-icon">📄</span> 代码查看
      </div>
      <div class="tab" :class="{active: tab==='chat'}" @click="tab='chat'">
        <span class="tab-icon">🤖</span> AI 问答
        <template x-if="chatHistory.length">
          <span style="background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:2px" x-text="chatHistory.length"></span>
        </template>
      </div>
    </div>

    <!-- Code view -->
    <template x-if="tab==='code'">
      <div class="code-view">
        <template x-if="!fileContent">
          <div class="code-empty">
            <div class="empty-icon">📂</div>
            <p>从左侧选择文件查看内容</p>
          </div>
        </template>
        <template x-if="fileContent">
          <div>
            <div class="code-header">
              <span>📄</span>
              <span class="path" x-text="activeFile"></span>
              <button class="copy-btn" @click="copyCode()">复制</button>
            </div>
            <pre x-text="fileContent"></pre>
          </div>
        </template>
      </div>
    </template>

    <!-- Chat -->
    <template x-if="tab==='chat'">
      <div class="chat-wrap">
        <div class="chat-messages" x-ref="chatMessages">
          <template x-if="!chatHistory.length">
            <div class="chat-welcome">
              <div class="welcome-icon">🤖</div>
              <h3>iOS 自动化框架助手</h3>
              <p>基于项目代码回答问题，支持 Page Object、API 测试、配置等</p>
              <div class="chat-suggestions">
                <template x-for="s in suggestions" :key="s">
                  <span class="suggestion" @click="askSuggestion(s)" x-text="s"></span>
                </template>
              </div>
            </div>
          </template>
          <template x-for="(m, i) in chatHistory" :key="i">
            <div class="msg-row" :class="m.role">
              <div class="msg-avatar" :class="m.role" x-text="m.role === 'user' ? '👤' : '🤖'"></div>
              <div class="msg-bubble">
                <div class="msg-content" x-text="m.text"></div>
                <template x-if="m.refs && m.refs.length">
                  <div class="msg-refs">
                    <template x-for="r in m.refs" :key="r">
                      <span class="msg-ref" @click="loadFile(r); tab='code'" x-text="r"></span>
                    </template>
                  </div>
                </template>
                <div class="msg-time" x-text="m.time"></div>
              </div>
            </div>
          </template>
          <template x-if="chatLoading">
            <div class="msg-row assistant">
              <div class="msg-avatar assistant">🤖</div>
              <div class="typing"><span></span><span></span><span></span></div>
            </div>
          </template>
        </div>
        <div class="chat-input-wrap">
          <div class="chat-input-box">
            <input type="text" placeholder="问一个关于项目的问题..." x-model="chatInput"
              @keydown.enter="sendChat()" :disabled="chatLoading">
            <button class="send-btn" @click="sendChat()" :disabled="chatLoading || !chatInput.trim()">➤</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Right panel -->
  <div class="right">
    <!-- Env -->
    <div class="env-section">
      <div class="section-title">⚡ 环境状态</div>
      <div class="env-grid">
        <div class="env-card">
          <div class="env-label">Python</div>
          <div class="env-val ok" x-text="env.python?.version || '...'"></div>
        </div>
        <div class="env-card">
          <div class="env-label">pytest</div>
          <div class="env-val" :class="env.pytest?.ok ? 'ok' : 'err'" x-text="env.pytest?.ok ? '✓ OK' : '✗ Missing'"></div>
        </div>
        <div class="env-card">
          <div class="env-label">Allure</div>
          <div class="env-val" :class="env.allure?.ok ? 'ok' : 'warn'" x-text="env.allure?.ok ? '✓ OK' : '⚠ Missing'"></div>
        </div>
        <div class="env-card">
          <div class="env-label">Appium</div>
          <div class="env-val" :class="env.appium?.ok ? 'ok' : 'err'" x-text="env.appium?.ok ? '✓ OK' : '✗ N/A'"></div>
        </div>
      </div>
    </div>

    <!-- Modules -->
    <div class="modules-section">
      <div class="section-title">🚀 测试模块</div>
      <template x-for="m in modules" :key="m.id">
        <div class="module-card" :class="{disabled: !m.runnable}">
          <div class="module-icon" :class="m.type" x-text="m.type === 'api' ? '🔌' : '📱'"></div>
          <div class="module-info">
            <div class="module-name" x-text="m.name"></div>
            <div class="module-hint" x-text="m.disabled_reason || m.type.toUpperCase() + ' Test'"></div>
          </div>
          <button class="run-btn" :class="m.type"
            :disabled="!m.runnable || (activeRun && activeRun.status === 'running')"
            @click="startRun(m.id)">运行</button>
        </div>
      </template>
    </div>

    <!-- Log -->
    <div class="log-section">
      <div class="log-header">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)">📋 执行日志</span>
        <template x-if="logLines.length">
          <span style="font-size:10px;color:var(--text3);margin-left:4px" x-text="logLines.length + ' 行'"></span>
        </template>
        <template x-if="logLines.length">
          <button class="btn" style="margin-left:auto;padding:2px 8px;font-size:10px" @click="logLines=[]">清空</button>
        </template>
      </div>
      <div class="log-area" x-ref="logArea">
        <template x-if="!logLines.length">
          <div class="log-empty">
            <span>📭</span>
            <span>运行测试后日志将显示在这里</span>
          </div>
        </template>
        <template x-for="(line, i) in logLines" :key="i">
          <div class="log-line" :class="logClass(line)" x-text="line"></div>
        </template>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot" :class="activeRun?.status || 'idle'"></div>
      <span class="status-text" x-text="statusText()"></span>
      <span class="status-time" x-text="activeRun?.finished_at ? duration() : ''"></span>
      <template x-if="activeRun && (activeRun.status === 'running' || activeRun.status === 'queued')">
        <button class="cancel-btn" @click="cancelRun()">取消</button>
      </template>
      <template x-if="reportUrl">
        <a class="report-link" :href="reportUrl" target="_blank">📊 Allure 报告</a>
      </template>
    </div>
  </div>
</div>

<script>
function app() {
  return {
    env: {}, files: [], modules: [],
    activeFile: null, fileContent: null,
    tab: 'code', fileSearch: '',
    chatHistory: [], chatInput: '', chatLoading: false,
    activeRun: null, logLines: [], reportUrl: null,
    _es: null,
    suggestions: ['登录测试怎么写？', 'Page Object 模式怎么实现？', 'API 测试如何添加用例？', 'UI 测试为什么要 -n 0？'],

    async init() {
      const [e, f, m] = await Promise.all([
        fetch('/api/env').then(r => r.json()),
        fetch('/api/files').then(r => r.json()),
        fetch('/api/test-modules').then(r => r.json()),
      ]);
      this.env = e; this.files = f; this.modules = m;
    },

    get filteredFiles() {
      if (!this.fileSearch) return this.files;
      const q = this.fileSearch.toLowerCase();
      return this.files.filter(f => f.path.toLowerCase().includes(q));
    },

    fileName(path) { return path.split('/').pop(); },
    fileDir(path) {
      const parts = path.split('/');
      return parts.length > 1 ? parts.slice(0, -1).join('/') : '';
    },
    fileIcon(path) {
      const ext = path.split('.').pop();
      const icons = { py: '🐍', yaml: '⚙️', yml: '⚙️', md: '📝', ini: '🔧', txt: '📄', sh: '💻', bat: '💻', json: '📋' };
      return icons[ext] || '📄';
    },

    async loadFile(path) {
      this.activeFile = path;
      this.tab = 'code';
      const res = await fetch('/api/files/content?path=' + encodeURIComponent(path)).then(r => r.json());
      this.fileContent = res.content || res.error || '';
    },

    copyCode() {
      if (this.fileContent) navigator.clipboard.writeText(this.fileContent);
    },

    askSuggestion(s) { this.chatInput = s; this.sendChat(); },

    async sendChat() {
      const q = this.chatInput.trim();
      if (!q) return;
      const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      this.chatHistory.push({ role: 'user', text: q, time: now });
      this.chatInput = '';
      this.chatLoading = true;
      this.$nextTick(() => this._scrollChat());
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        }).then(r => r.json());
        const t = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        this.chatHistory.push({ role: 'assistant', text: res.answer, refs: res.references, time: t });
      } catch (e) {
        this.chatHistory.push({ role: 'assistant', text: '请求失败：' + e.message, time: '' });
      }
      this.chatLoading = false;
      this.$nextTick(() => this._scrollChat());
    },

    _scrollChat() {
      const el = this.$refs.chatMessages;
      if (el) el.scrollTop = el.scrollHeight;
    },

    async startRun(moduleId) {
      this.logLines = []; this.reportUrl = null;
      const res = await fetch('/api/runs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ module_id: moduleId }),
      }).then(r => r.json());
      this.activeRun = res;
      this._connectSSE(res.run_id);
    },

    _connectSSE(runId) {
      if (this._es) this._es.close();
      this._es = new EventSource('/api/runs/' + runId + '/events');
      this._es.onmessage = (e) => {
        if (e.data) {
          this.logLines.push(e.data);
          this.$nextTick(() => {
            const el = this.$refs.logArea;
            if (el) el.scrollTop = el.scrollHeight;
          });
        }
      };
      this._es.addEventListener('done', async () => {
        this._es.close();
        const run = await fetch('/api/runs/' + runId).then(r => r.json());
        this.activeRun = run;
        if (run.report_path) this.reportUrl = '/reports/' + runId + '/index.html';
      });
    },

    async cancelRun() {
      if (!this.activeRun) return;
      await fetch('/api/runs/' + this.activeRun.run_id + '/cancel', { method: 'POST' });
      if (this._es) this._es.close();
      this.activeRun = await fetch('/api/runs/' + this.activeRun.run_id).then(r => r.json());
    },

    logClass(line) {
      if (line.includes('PASSED')) return 'pass';
      if (line.includes('FAILED') || line.includes('ERROR')) return 'fail';
      if (line.includes('WARNING')) return 'warn';
      if (line.startsWith('===') || line.startsWith('---')) return 'dim';
      return 'info';
    },

    statusText() {
      if (!this.activeRun) return '空闲';
      const map = { queued: '排队中', running: '运行中', succeeded: '✓ 成功', failed: '✗ 失败', cancelled: '已取消', timeout: '超时' };
      return (map[this.activeRun.status] || this.activeRun.status) + ' · ' + (this.activeRun.module_id || '');
    },

    duration() {
      if (!this.activeRun?.started_at || !this.activeRun?.finished_at) return '';
      const s = (new Date(this.activeRun.finished_at) - new Date(this.activeRun.started_at)) / 1000;
      return s.toFixed(1) + 's';
    },
  };
}
</script>
</body>
</html>
