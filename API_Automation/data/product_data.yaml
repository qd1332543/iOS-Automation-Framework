# 商品模块测试数据

# ===== 搜索测试数据 =====
search_cases:
  # 正常搜索
  - name: 搜索热门关键词-手机
    keyword: "手机"
    expected_code: 0
    min_results: 5
    tags: [smoke, happy]

  - name: 搜索热门关键词-耳机
    keyword: "耳机"
    expected_code: 0
    min_results: 3
    tags: [happy]

  - name: 搜索品牌名-Apple
    keyword: "Apple"
    expected_code: 0
    tags: [happy]

  - name: 模糊搜索-部分名称
    keyword: "iPhone"
    expected_code: 0
    tags: [happy]

  # 边界/异常搜索
  - name: 搜索不存在的商品
    keyword: "zzzzzzzz_not_exist_2024_test"
    expected_code: 0
    expected_result_count: 0
    tags: [edge, unhappy]

  - name: 搜索关键词为空
    keyword: ""
    expected_code: 4001
    tags: [edge, invalid]

  - name: 特殊字符搜索
    keyword: "<script>alert('xss')</script>"
    expected_code: 0  # 应做转义处理，不应报错
    tags: [security]

  - name: 超长关键词搜索
    keyword: "这是一个非常非常长的搜索关键词用于测试系统对超长输入的处理能力"
    expected_code: 0
    tags: [edge]

# ===== 分类测试数据 =====
category_cases:
  - name: 获取一级分类列表
    parent_id: 0
    expected_min_categories: 8
    tags: [smoke]

  - name: 获取数码子分类
    parent_id: 1  # 假设数码分类ID=1
    expected_min_subcategories: 3
    tags: [happy]

  - name: 不存在的父级分类ID
    parent_id: 9999999
    expected_code: 0
    expected_empty_list: true
    tags: [edge, unhappy]

# ===== 商品详情测试数据 =====
product_detail_cases:
  - name: 存在的商品详情查询
    product_id: 10001
    expected_fields: ["name", "price", "images", "specs"]
    tags: [smoke]

  - name: 不存在的商品
    product_id: 9999999
    expected_code: 404
    expected_msg: "商品不存在"
    tags: [edge, unhappy]

  - name: 商品ID为负数
    product_id: -1
    expected_code: 400
    tags: [edge, invalid]

# ===== 收藏功能测试数据 =====
collect_cases:
  - name: 收藏商品
    product_id: 10001
    action: add
    expected_code: 0
    tags: [smoke]

  - name: 取消收藏
    product_id: 10001
    action: remove
    expected_code: 0
    tags: [happy]

  - name: 重复收藏同一商品（幂等性）
    product_id: 10001
    action: add
    expected_code: 0  # 重复收藏应返回成功
    tags: [edge]

  - name: 收藏不存在的商品
    product_id: 9999999
    action: add
    expected_code: 404
    tags: [edge, unhappy]
